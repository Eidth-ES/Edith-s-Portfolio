<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
  <style>
    :root {
      --home-bg: #f4f4f4;
      --home-topbar-h: clamp(44px, 6vh, 64px);
      --home-gap: clamp(10px, 2vh, 18px);
      --home-card-size: min(70vmin, 56rem, calc(100vh - var(--home-topbar-h) - 18rem));
    }
    *, *::before, *::after { box-sizing: border-box; }
    html.lenis, html.lenis body { height: auto; }
    .lenis.lenis-smooth { scroll-behavior: auto !important; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Special Elite", "Songti SC", "SimSun", serif;
      background: var(--home-bg);
      cursor: none;
      overflow-x: hidden;
    }
    body.page-detail-open { overflow: hidden; height: 100vh; }

    /* Custom cursor */
    .cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      width: 40px;
      height: 40px;
      margin: -20px 0 0 -20px;
      border: 2px solid #111;
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      mix-blend-mode: difference;
      background: transparent;
    }
    .cursor-dot {
      position: fixed;
      top: 0;
      left: 0;
      width: 8px;
      height: 8px;
      margin: -4px 0 0 -4px;
      border-radius: 50%;
      background: #111;
      pointer-events: none;
      z-index: 10001;
    }

    .page { display: none; }
    .page.is-active { display: block; }

    /* —— Home —— */
    #home {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--home-bg);
      padding-top: var(--home-topbar-h);
    }
    #home .home-topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--home-topbar-h);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 60;
      background: rgba(244, 244, 244, 0.92);
      border-bottom: 2px solid rgba(0, 0, 0, 0.12);
    }
    #home .home-index {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 2vw, 26px);
      padding: 0 1rem;
      max-width: min(92vw, 72rem);
      overflow-x: auto;
      white-space: nowrap;
    }
    #home .home-index button {
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: clamp(12px, 1.2vw, 18px);
      letter-spacing: 0.02em;
      color: rgba(0, 0, 0, 0.7);
      padding: 0.4rem 0.25rem;
      cursor: pointer;
      transition: color 0.25s, transform 0.25s;
    }
    #home .home-index button.is-current {
      color: #111;
      transform: translateY(-1px);
    }
    #home .slider-viewport {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #home .slider-track {
      display: flex;
      height: 100%;
      will-change: transform;
    }
    #home .slide-panel {
      flex: 0 0 100vw;
      width: 100vw;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: var(--home-gap);
      padding: 1rem 1.5rem;
    }
    @media (min-width: 768px) {
      #home .slide-panel { padding: 1.5rem 2.5rem; }
    }
    #home .slide-card {
      width: var(--home-card-size);
      max-width: none;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      aspect-ratio: auto;
    }
    #home .slide-card-inner {
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
    }
    #home .slide-card h2 {
      position: static;
      left: auto;
      bottom: auto;
      transform: none;
      margin: var(--home-gap) 0 0 0;
      font-size: clamp(16px, 2.2vw, 32px);
      text-align: center;
      white-space: normal;
      width: 100%;
    }

    .slide-card {
      position: relative;
      width: 100%;
      max-width: 56rem;
      aspect-ratio: 1 / 1;
      cursor: pointer;
    }
    .slide-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 1rem;
      overflow: hidden;
      /* 素描风边框 */
      border: 2px solid #2a2a2a;
      box-shadow:
        3px 3px 0 rgba(0, 0, 0, 0.12),
        inset 0 0 0 1px rgba(255, 255, 255, 0.35),
        inset 0 -2px 0 rgba(0, 0, 0, 0.06);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.35) 0%, transparent 45%, rgba(0, 0, 0, 0.04) 100%),
        repeating-linear-gradient(
          -8deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 3px
        );
    }
    .slide-card-inner::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px dashed rgba(0, 0, 0, 0.25);
      pointer-events: none;
    }
    .slide-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.65s ease;
    }
    .slide-card:hover img { transform: scale(1.05); }
    .slide-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.35), transparent 55%);
      pointer-events: none;
    }
    .slide-card-gloss {
      position: absolute;
      inset: -4px;
      border-radius: 1.1rem;
      opacity: 0.28;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.45) 0%, transparent 50%, rgba(0, 0, 0, 0.08) 100%);
    }
    .slide-card h2 {
      position: absolute;
      left: 50%;
      bottom: -3.25rem;
      transform: translateX(-50%);
      margin: 0;
      font-size: clamp(1.1rem, 3.5vw, 2rem);
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: 0.06em;
      color: #111;
    }
    #home .home-card-quote {
      margin: 0;
      max-width: min(90vw, 56rem);
      font-size: clamp(14px, 1.6vw, 24px);
      font-weight: 400;
      line-height: 1.35;
      letter-spacing: 0.02em;
      text-align: center;
      color: #000;
      pointer-events: none;
    }
    @media (max-width: 640px) {
      .slide-card h2 { white-space: normal; text-align: center; width: 90%; bottom: -4.5rem; }
    }

    #home .dots {
      position: fixed;
      bottom: clamp(18px, 3vh, 40px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: clamp(10px, 1.2vw, 16px);
      z-index: 50;
    }
    #home .dots button {
      width: clamp(10px, 1vw, 12px);
      height: clamp(10px, 1vw, 12px);
      border-radius: 50%;
      border: none;
      padding: 0;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.28);
      transition: transform 0.3s, background 0.3s;
    }
    #home .dots button.is-current {
      background: #111;
      transform: scale(1.45);
    }
    #home .scroll-hint {
      position: fixed;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      opacity: 0.45;
      pointer-events: none;
    }
    @media (max-width: 640px) {
      #home .scroll-hint { display: none; }
    }

    /* —— Detail pages —— */
    .detail-page {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      flex-direction: column;
    }
    .detail-page.is-active { display: flex; }
    .detail-page .back-btn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 120;
      padding: 0.65rem 1.25rem;
      border: 2px solid #111;
      border-radius: 0.5rem;
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.25s, color 0.25s, transform 0.25s;
    }
    .detail-page .back-btn:hover {
      background: #111;
      color: #fff;
      transform: translateX(-3px);
    }
    .detail-page .detail-title {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 110;
      margin: 0;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 700;
      text-align: center;
      max-width: 70vw;
    }
    .detail-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      margin-top: 5.5rem;
      padding: 0 1rem 1.5rem;
      gap: 1rem;
    }
    @media (min-width: 768px) {
      .detail-body {
        flex-direction: row;
        padding: 0 1.5rem 2rem;
        gap: 0;
      }
    }
    .detail-aside {
      flex-shrink: 0;
      width: 100%;
      max-height: 38vh;
      overflow-y: auto;
      padding-right: 0.25rem;
    }
    @media (min-width: 768px) {
      .detail-aside {
        width: 18rem;
        max-height: none;
        position: sticky;
        top: 5.5rem;
        align-self: flex-start;
        max-height: calc(100vh - 6rem);
        overflow-y: auto;
      }
    }
    .detail-aside .cat-nav {
      display: flex;
      flex-direction: row;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid rgba(0, 0, 0, 0.08);
      overflow-x: auto;
    }
    @media (min-width: 768px) {
      .detail-aside .cat-nav {
        flex-direction: column;
        overflow-x: visible;
      }
    }
    .detail-aside .cat-nav button,
    .detail-aside .article-list button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.65rem 0.85rem;
      border: none;
      border-radius: 0.5rem;
      background: transparent;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.25s, transform 0.25s;
    }
    @media (min-width: 768px) {
      .detail-aside .cat-nav button,
      .detail-aside .article-list button { white-space: normal; }
    }
    .detail-aside .cat-nav button:hover,
    .detail-aside .article-list button:hover {
      background: rgba(0, 0, 0, 0.05);
    }
    .detail-aside .cat-nav button.is-active,
    .detail-aside .article-list button.is-active {
      background: rgba(0, 0, 0, 0.1);
      font-weight: 700;
    }
    .detail-aside .article-list {
      display: flex;
      flex-direction: row;
      gap: 0.35rem;
      overflow-x: auto;
    }
    @media (min-width: 768px) {
      .detail-aside .article-list {
        flex-direction: column;
        overflow-x: visible;
      }
    }
    .detail-main {
      flex: 1;
      min-height: 0;
      min-width: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-left: 0;
    }
    @media (min-width: 768px) {
      .detail-main { padding-left: 1.5rem; }
    }
    .content-box {
      background: #fff;
      border-radius: 1rem;
      padding: 1.5rem 1.25rem;
      min-height: 50vh;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }
    @media (min-width: 768px) {
      .content-box { padding: 2rem 2.5rem; min-height: 60vh; }
    }
    .content-box .placeholder {
      color: #9ca3af;
      text-align: center;
      padding: 3rem 1rem;
      font-style: italic;
    }
    .content-box .article-body {
      color: #111;
      line-height: 1.75;
      font-size: 1rem;
    }
    #sariel-page .content-box .article-body {
      text-align: left;
    }
    #sariel-page .content-box .article-body .text {
      white-space: pre-wrap;
      line-height: 1.2;
    }
    #evan-page .content-box .article-body {
      text-align: left;
    }
    #evan-page .content-box .article-body .text {
      white-space: pre-wrap;
      line-height: 1.2;
    }
    #slices-page .content-box .article-body {
      text-align: left;
    }
    #slices-page .content-box .article-body .text {
      white-space: pre-wrap;
      line-height: 1.2;
    }
    .content-box .article-body h1 {
      font-size: 1.5rem;
      margin-top: 0;
    }
    #slices-page .content-box .article-body h1 { color: #000; }
    #original-page .content-box .article-body {
      text-align: left;
    }
    #original-page .content-box .article-body .text {
      white-space: pre-wrap;
      line-height: 1.2;
    }
    #original-page .content-box .article-body iframe {
      display: block;
      width: 100%;
      height: 70vh;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="cursor-ring" id="cursorRing" aria-hidden="true"></div>
  <div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>

  <!-- Home -->
  <div id="home" class="page is-active" data-lenis-prevent>
    <div class="home-topbar">
      <nav class="home-index" id="homeIndex" aria-label="作品集索引">
        <button type="button" data-slide="0" data-clickable>光夜同人-Evan</button>
        <button type="button" data-slide="1" data-clickable>光夜同人-Sariel</button>
        <button type="button" data-slide="2" data-clickable>光夜切片</button>
        <button type="button" data-slide="3" data-clickable>原创武侠言情</button>
      </nav>
    </div>
    <div class="slider-viewport">
      <div class="slider-track" id="sliderTrack">
        <div class="slide-panel">
          <p class="home-card-quote">I offer you the bitterness of a man who has looked long and long at the lonely moon.</p>
          <div class="slide-card" data-target="evan-page" data-clickable>
            <div class="slide-card-inner">
              <img src="public/images/evan.jpg.jpg" alt="光夜同人-Evan" />
              <div class="slide-card-overlay"></div>
              <div class="slide-card-gloss"></div>
            </div>
            <h2>光夜同人-Evan</h2>
          </div>
        </div>
        <div class="slide-panel">
          <p class="home-card-quote">If we do —face to face. Look at the whole earth and the ocean. Look at all of me.</p>
          <div class="slide-card" data-target="sariel-page" data-clickable>
            <div class="slide-card-inner">
              <img src="public/images/sariel.jpg.jpg" alt="光夜同人-Sariel" />
              <div class="slide-card-overlay"></div>
              <div class="slide-card-gloss"></div>
            </div>
            <h2>光夜同人-Sariel</h2>
          </div>
        </div>
        <div class="slide-panel">
          <div class="slide-card" data-target="slices-page" data-clickable>
            <div class="slide-card-inner">
              <img src="public/images/slices.jpg.jpg" alt="光夜切片" />
              <div class="slide-card-overlay"></div>
              <div class="slide-card-gloss"></div>
            </div>
            <h2>光夜切片</h2>
          </div>
        </div>
        <div class="slide-panel">
          <div class="slide-card" data-target="original-page" data-clickable>
            <div class="slide-card-inner">
              <img src="public/images/original.jpg.jpg" alt="原创武侠言情" />
              <div class="slide-card-overlay"></div>
              <div class="slide-card-gloss"></div>
            </div>
            <h2>原创武侠言情</h2>
          </div>
        </div>
      </div>
    </div>
    <div class="dots" id="sliderDots"></div>
    <div class="scroll-hint">SCROLL →</div>
  </div>

  <!-- Evan -->
  <div id="evan-page" class="page detail-page" style="background-color: hsl(334, 25%, 95%);">
    <button type="button" class="back-btn" data-back data-clickable>← 返回</button>
    <h1 class="detail-title" style="color: hsl(334, 25%, 25%);">光夜同人 - Evan</h1>
    <div class="detail-body">
      <aside class="detail-aside" data-index-color="hsl(334, 25%, 40%)">
        <nav class="cat-nav" id="evan-cats"></nav>
        <div class="article-list" id="evan-articles"></div>
      </aside>
      <main class="detail-main" id="evan-scroll">
        <div class="lenis-inner">
          <div class="content-box" id="evan-content">
            <p class="placeholder">请从左侧选择文章</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Sariel -->
  <div id="sariel-page" class="page detail-page" style="background-color: #D9FFF7;">
    <button type="button" class="back-btn" data-back data-clickable>← 返回</button>
    <h1 class="detail-title" style="color: hsl(197, 12%, 22%);">光夜同人 - Sariel</h1>
    <div class="detail-body">
      <aside class="detail-aside" data-index-color="hsl(197, 12%, 40%)">
        <nav class="cat-nav" id="sariel-cats"></nav>
        <div class="article-list" id="sariel-articles"></div>
      </aside>
      <main class="detail-main" id="sariel-scroll">
        <div class="lenis-inner">
          <div class="content-box" id="sariel-content">
            <p class="placeholder">请从左侧选择文章</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Slices -->
  <div id="slices-page" class="page detail-page" style="background-color: hsl(49, 56%, 95%);">
    <button type="button" class="back-btn" data-back data-clickable>← 返回</button>
    <h1 class="detail-title" style="color: #333;">光夜切片</h1>
    <div class="detail-body">
      <aside class="detail-aside" data-index-color="#000">
        <div class="article-list" id="slices-articles" style="flex-direction: column;"></div>
      </aside>
      <main class="detail-main" id="slices-scroll">
        <div class="lenis-inner">
          <div class="content-box" id="slices-content">
            <p class="placeholder">请从左侧选择文章</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Original -->
  <div id="original-page" class="page detail-page" style="background-color: #f4f4f4;">
    <button type="button" class="back-btn" data-back data-clickable>← 返回</button>
    <h1 class="detail-title" style="color: #222;">原创武侠言情</h1>
    <div class="detail-body">
      <aside class="detail-aside" data-index-color="#4a4a4a">
        <div class="article-list" id="original-articles" style="flex-direction: column;"></div>
      </aside>
      <main class="detail-main" id="original-scroll">
        <div class="lenis-inner">
          <div class="content-box" id="original-content">
            <p class="placeholder">请从左侧选择文章</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
(function () {
  var SLIDE_COUNT = 4;
  var currentSlide = 0;
  var isSlideAnimating = false;
  var isPageTransitioning = false;

  var sliderTrack = document.getElementById("sliderTrack");
  var sliderDots = document.getElementById("sliderDots");
  var home = document.getElementById("home");
  var homeIndex = document.getElementById("homeIndex");
  var cursorRing = document.getElementById("cursorRing");
  var cursorDot = document.getElementById("cursorDot");

  var lenisRoot = null;
  var lenisRafId = null;

  function startLenisForElement(wrapperEl) {
    stopLenis();
    if (typeof Lenis === "undefined" || !wrapperEl) return;
    var inner = wrapperEl.querySelector(".lenis-inner");
    if (!inner) return;
    try {
      lenisRoot = new Lenis({
        wrapper: wrapperEl,
        content: inner,
        duration: 1.15,
        smoothWheel: true,
        wheelMultiplier: 1,
      });
      function raf(t) {
        if (!lenisRoot) return;
        lenisRoot.raf(t);
        lenisRafId = requestAnimationFrame(raf);
      }
      lenisRafId = requestAnimationFrame(raf);
    } catch (e) {
      lenisRoot = null;
    }
  }

  function startLenisWindow() {
    stopLenis();
    document.documentElement.classList.add("lenis", "lenis-smooth");
    if (typeof Lenis === "undefined") return;
    try {
      lenisRoot = new Lenis({
        duration: 1.15,
        smoothWheel: true,
      });
      function raf(t) {
        if (!lenisRoot) return;
        lenisRoot.raf(t);
        lenisRafId = requestAnimationFrame(raf);
      }
      lenisRafId = requestAnimationFrame(raf);
    } catch (e) {
      lenisRoot = null;
    }
  }

  function stopLenis() {
    if (lenisRafId) {
      cancelAnimationFrame(lenisRafId);
      lenisRafId = null;
    }
    if (lenisRoot && typeof lenisRoot.destroy === "function") {
      lenisRoot.destroy();
    }
    lenisRoot = null;
  }

  function syncDots() {
    var dots = sliderDots.querySelectorAll("button");
    for (var i = 0; i < dots.length; i++) {
      dots[i].classList.toggle("is-current", i === currentSlide);
    }
  }

  function syncIndex() {
    if (!homeIndex) return;
    var btns = homeIndex.querySelectorAll("button");
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle("is-current", i === currentSlide);
    }
  }

  function goToSlide(index, skipIfSame) {
    if (index < 0 || index >= SLIDE_COUNT) return;
    if (skipIfSame && index === currentSlide) return;
    if (isSlideAnimating) return;
    isSlideAnimating = true;
    currentSlide = index;
    var x = -index * window.innerWidth;
    gsap.to(sliderTrack, {
      x: x,
      duration: 0.85,
      ease: "power3.inOut",
      onComplete: function () {
        isSlideAnimating = false;
      },
    });
    var cards = document.querySelectorAll("#home .slide-card");
    cards.forEach(function (card, i) {
      gsap.to(card, {
        scale: i === index ? 1 : 0.92,
        opacity: i === index ? 1 : 0.62,
        duration: 0.55,
        ease: "power2.out",
      });
    });
    syncDots();
    syncIndex();

  function buildDots() {
    sliderDots.innerHTML = "";
    for (var i = 0; i < SLIDE_COUNT; i++) {
      var b = document.createElement("button");
      b.type = "button";
      b.setAttribute("data-clickable", "");
      b.addEventListener("click", function (idx) {
        return function () {
          goToSlide(idx, false);
        };
      }(i));
      sliderDots.appendChild(b);
    }
    syncDots();
    syncIndex();
  }

  function bindHomeIndex() {
    if (!homeIndex) return;
    homeIndex.querySelectorAll("button").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var idx = parseInt(btn.getAttribute("data-slide") || "0", 10);
        if (!Number.isFinite(idx)) idx = 0;
        goToSlide(idx, false);
      });
    });
  }

  function getActiveDetailScroll() {
    var d = document.querySelector(".detail-page.is-active");
    if (!d) return null;
    return d.querySelector(".detail-main");
  }

  function showHome() {
    stopLenis();
    document.body.classList.remove("page-detail-open");
    document.documentElement.classList.remove("lenis", "lenis-smooth");
    document.querySelectorAll(".page, .detail-page").forEach(function (el) {
      el.classList.remove("is-active");
    });
    home.classList.add("is-active");
    document.querySelectorAll("#home .slide-card").forEach(function (card) {
      gsap.set(card, { scale: 1, opacity: 1, clearProps: "transform" });
    });
    gsap.set(home, { opacity: 0 });
    gsap.to(home, { opacity: 1, duration: 0.5, ease: "power2.out" });
    goToSlide(currentSlide, false);
    startLenisWindow();
  }

  function onCardNavigate(pageId, cardEl) {
    if (isPageTransitioning) return;
    isPageTransitioning = true;
    stopLenis();
    var inner = cardEl.querySelector(".slide-card-inner");
    var tl = gsap.timeline({
      onComplete: function () {
        home.classList.remove("is-active");
        document.querySelectorAll(".detail-page").forEach(function (el) {
          el.classList.remove("is-active");
        });
        var target = document.getElementById(pageId);
        if (!target) {
          isPageTransitioning = false;
          showHome();
          return;
        }
        target.classList.add("is-active");
        document.body.classList.add("page-detail-open");
        document.documentElement.classList.add("lenis", "lenis-smooth");
        gsap.set(target, { opacity: 0 });
        gsap.set(cardEl, { scale: 1 });
        gsap.set(inner, { scale: 1, opacity: 1 });
        gsap.to(target, {
          opacity: 1,
          duration: 0.5,
          ease: "power2.out",
          onComplete: function () {
            isPageTransitioning = false;
            var sc = getActiveDetailScroll();
            if (sc) startLenisForElement(sc);
          },
        });
      },
    });
    tl.to(cardEl, { scale: 1.05, duration: 0.2, ease: "power2.out" }, 0);
    tl.to(cardEl, { scale: 0.96, opacity: 0, duration: 0.45, ease: "power3.in" }, 0.15);
    tl.to(home, { opacity: 0, duration: 0.35, ease: "power2.in" }, 0.1);
  }

  function applyIndexColors(aside) {
    var c = aside.getAttribute("data-index-color");
    if (!c) return;
    aside.querySelectorAll("button").forEach(function (btn) {
      btn.style.color = c;
    });
  }

  function setupEvanSariel(prefix, blocks) {
    var catsEl = document.getElementById(prefix + "-cats");
    var artEl = document.getElementById(prefix + "-articles");
    var contentEl = document.getElementById(prefix + "-content");
    var aside = catsEl.closest(".detail-aside");
    var activeCat = blocks[0].id;
    var activeArticleId = "";

    function renderArticles() {
      artEl.innerHTML = "";
      var cat = null;
      for (var ci = 0; ci < blocks.length; ci++) {
        if (blocks[ci].id === activeCat) {
          cat = blocks[ci];
          break;
        }
      }
      if (!cat) return;
      cat.articles.forEach(function (a) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = a.title;
        btn.setAttribute("data-clickable", "");
        if (a.id === activeArticleId) btn.classList.add("is-active");
        btn.addEventListener("click", function () {
          activeArticleId = a.id;
          artEl.querySelectorAll("button").forEach(function (b) {
            b.classList.remove("is-active");
          });
          btn.classList.add("is-active");
          contentEl.innerHTML = '<div class="article-body">' + a.content + "</div>";
          gsap.fromTo(
            contentEl,
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }
          );
        });
        artEl.appendChild(btn);
      });
      applyIndexColors(aside);
    }

    blocks.forEach(function (cat) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = cat.name;
      btn.setAttribute("data-clickable", "");
      if (cat.id === activeCat) btn.classList.add("is-active");
      btn.addEventListener("click", function () {
        activeCat = cat.id;
        activeArticleId = "";
        contentEl.innerHTML = '<p class="placeholder">请从左侧选择文章</p>';
        catsEl.querySelectorAll("button").forEach(function (b) {
          b.classList.remove("is-active");
        });
        btn.classList.add("is-active");
        renderArticles();
      });
      catsEl.appendChild(btn);
    });
    renderArticles();
    applyIndexColors(aside);
  }

  function setupSimpleList(listId, contentId, articles) {
    var artEl = document.getElementById(listId);
    var contentEl = document.getElementById(contentId);
    var aside = artEl.closest(".detail-aside");
    artEl.innerHTML = "";
    articles.forEach(function (a) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = a.title;
      btn.setAttribute("data-clickable", "");
      btn.addEventListener("click", function () {
        artEl.querySelectorAll("button").forEach(function (b) {
          b.classList.remove("is-active");
        });
        btn.classList.add("is-active");
        contentEl.innerHTML = '<div class="article-body">' + a.content + "</div>";
        gsap.fromTo(
          contentEl,
          { opacity: 0, y: 16 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }
        );
      });
      artEl.appendChild(btn);
    });
    applyIndexColors(aside);
  }

  /* —— Custom cursor —— */
  function moveCursor(e) {
    gsap.to(cursorRing, {
      x: e.clientX,
      y: e.clientY,
      duration: 0.45,
      ease: "power3.out",
    });
    gsap.to(cursorDot, {
      x: e.clientX,
      y: e.clientY,
      duration: 0.08,
      ease: "power2.out",
    });
  }

  function bindCursorHoverables() {
    var ringScale = { v: 1 };
    var targets = document.querySelectorAll(
      "a, button, [data-clickable], .slide-card, .back-btn"
    );
    targets.forEach(function (el) {
      function enter() {
        gsap.to(cursorRing, { scale: 2.4, opacity: 0.55, duration: 0.28, ease: "power2.out" });
      }
      function leave() {
        gsap.to(cursorRing, { scale: 1, opacity: 1, duration: 0.28, ease: "power2.out" });
      }
      el.addEventListener("mouseenter", enter);
      el.addEventListener("mouseleave", leave);
    });
  }

  document.addEventListener("mousemove", moveCursor);

  /* —— Home wheel / keys —— */
  home.addEventListener(
    "wheel",
    function (e) {
      e.preventDefault();
      if (isSlideAnimating || isPageTransitioning) return;
      if (e.deltaY > 0 && currentSlide < SLIDE_COUNT - 1) {
        goToSlide(currentSlide + 1, true);
      } else if (e.deltaY < 0 && currentSlide > 0) {
        goToSlide(currentSlide - 1, true);
      }
    },
    { passive: false }
  );

  window.addEventListener("keydown", function (e) {
    if (!home.classList.contains("is-active")) return;
    if (e.key === "ArrowRight" && currentSlide < SLIDE_COUNT - 1) {
      goToSlide(currentSlide + 1, true);
    } else if (e.key === "ArrowLeft" && currentSlide > 0) {
      goToSlide(currentSlide - 1, true);
    }
  });

  window.addEventListener("resize", function () {
    if (home.classList.contains("is-active")) {
      gsap.set(sliderTrack, { x: -currentSlide * window.innerWidth });
    }
  });

  /* —— Card click —— */
  document.querySelectorAll("#home .slide-card").forEach(function (card) {
    card.addEventListener("click", function () {
      var pageId = card.getAttribute("data-target");
      if (pageId) onCardNavigate(pageId, card);
    });
  });

  /* —— Back —— */
  document.querySelectorAll("[data-back]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      if (isPageTransitioning) return;
      var active = document.querySelector(".detail-page.is-active");
      if (!active) return;
      isPageTransitioning = true;
      stopLenis();
      gsap.to(active, {
        opacity: 0,
        x: 40,
        duration: 0.45,
        ease: "power3.in",
        onComplete: function () {
          active.classList.remove("is-active");
          gsap.set(active, { x: 0, clearProps: "opacity" });
          showHome();
          isPageTransitioning = false;
        },
      });
    });
  });

  /* —— Init —— */
  buildDots();
  bindHomeIndex();
  gsap.set(sliderTrack, { x: 0 });
  goToSlide(0, false);

  setupEvanSariel("evan", evanCategoryBlock);
  setupEvanSariel("sariel", sarielCategoryBlock);
  setupSimpleList("slices-articles", "slices-content", slicesArticles);
  setupSimpleList("original-articles", "original-content", originalArticles);

  bindCursorHoverables();
  startLenisWindow();

  gsap.from(home, { opacity: 0, duration: 0.6, ease: "power2.out" });
})();
